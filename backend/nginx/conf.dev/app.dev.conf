server {
    listen 80;
    server_name localhost;

    # No SPA serving in dev (Vite handles this)
    location / {
        return 404;
    }

    # Development: vite > nginx > microservice
    # Nginx runs in Docker and FastAPI microservices run on the host machine.
    # proxy_pass http://host.docker.internal:8080/api/<microservice/;

    location /api/auth/ {
        # Keep original path when forwarding
        proxy_pass http://host.docker.internal:8080;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/customer/ {

        # Keep original path when forwarding
        proxy_pass http://host.docker.internal:8081;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

